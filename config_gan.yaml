# GliGAN — Synthetic Tumour Data Augmentation Config

# --- Paths ---
# UPDATE: set to the absolute path of the folder containing training_data1_v2/ and validation_data/
data_root: "/path/to/BraTS_data"
train_dir: "training_data1_v2"
output_dir: "./runs/gan"
checkpoint_dir: "./checkpoints/gan"

# --- Data ---
modalities: ["t1n", "t1c", "t2w", "t2f"]
data_fraction: 1.0
seed: 42

# --- GAN Architecture ---
gan:
  generator:
    name: "SwinUNETR"
    in_channels: 5        # 4 noisy modalities + 1 label channel
    out_channels: 4        # 4 reconstructed modalities
    feature_size: 24
    spatial_dims: 3

  discriminator:
    in_channels: 5         # 4 modality channels + 1 label channel
    base_filters: 64

  training:
    batch_size: 2
    lr: 0.0001
    phase1_iterations: 10000   # fixed lambda warmup (paper: 200k)
    phase2_epochs: 200         # linear lambda ramp (paper: 1000)
    lambda1: 1.0
    lambda2_start: 5.0
    lambda2_end: 100.0
    g_steps: 2                 # train generator 2x per discriminator step
    d_steps: 1

  generation:
    num_synthetic_per_case: 3  # synthetic cases per real case
    crop_size: [96, 96, 96]
