# GliGAN — Synthetic Tumour Data Augmentation Config

# --- Paths ---
data_root: "/Users/namantaneja/Library/Mobile Documents/com~apple~CloudDocs/Desktop/My Mac/Work/College/Research/implementBRaTS/Brats GLI"
train_dir: "training_data1_v2"
output_dir: "./runs/gan"
checkpoint_dir: "./checkpoints/gan"

# --- Data ---
modalities: ["t1n", "t1c", "t2w", "t2f"]
data_fraction: 0.03      # Small subset for quick testing
seed: 42

# --- GAN Architecture ---
gan:
  generator:
    name: "SwinUNETR"
    in_channels: 5        # 4 noisy modalities + 1 label channel
    out_channels: 4        # 4 reconstructed modalities
    feature_size: 24       # reduced for MPS (paper uses 48)
    spatial_dims: 3

  discriminator:
    in_channels: 5         # 4 modality channels + 1 label channel
    base_filters: 64

  training:
    batch_size: 1
    lr: 0.0001
    phase1_iterations: 500    # scaled down for MPS (paper: 200k)
    phase2_epochs: 50         # scaled down for MPS (paper: 1000)
    lambda1: 1.0
    lambda2_start: 5.0
    lambda2_end: 100.0
    g_steps: 2                # train generator 2x per iteration
    d_steps: 1                # train discriminator 1x per iteration

  generation:
    num_synthetic_per_case: 3  # scaled down (paper: 30)
    crop_size: [96, 96, 96]
