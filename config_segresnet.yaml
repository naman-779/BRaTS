# BRaTS 2024 Post-Treatment Glioma Segmentation — SegResNet (Model 1/3)

# --- Paths ---
data_root: "/Users/namantaneja/Library/Mobile Documents/com~apple~CloudDocs/Desktop/My Mac/Work/College/Research/implementBRaTS/Brats GLI"
train_dir: "training_data1_v2"
val_dir: "validation_data"
output_dir: "./runs/segresnet"
checkpoint_dir: "./checkpoints/segresnet"

# --- Data ---
modalities: ["t1n", "t1c", "t2w", "t2f"]
num_classes: 5           # 0=BG, 1=NETC, 2=SNFH, 3=ET, 4=RC
num_input_channels: 4
val_split: 0.1
data_fraction: 0.03      # Use ~40 cases for quick baseline
seed: 42

# --- Model ---
model:
  name: "SegResNet"
  spatial_dims: 3
  init_filters: 32
  in_channels: 4
  out_channels: 5
  blocks_down: [1, 2, 2, 4]
  blocks_up: [1, 1, 1]
  dropout_prob: 0.2
  norm: "GROUP"
  num_groups: 8
  upsample_mode: "deconv"

# --- Training ---
training:
  roi_size: [96, 96, 96]
  batch_size: 1
  num_workers: 0
  max_epochs: 10
  val_interval: 5
  amp: false
  cache_rate: 0.0

# --- Loss ---
loss:
  softmax: true
  to_onehot_y: true
  include_background: false
  lambda_dice: 1.0
  lambda_ce: 1.0

# --- Optimizer ---
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-5

# --- Scheduler ---
scheduler:
  warmup_epochs: 10

# --- Inference ---
inference:
  roi_size: [96, 96, 96]
  sw_batch_size: 2
  overlap: 0.5
  mode: "gaussian"
