# DynUNet (nnU-Net architecture) — 3D flat segmentation
# Trains with train.py, infers with inference.py

# --- Paths ---
data_root: "/Users/namantaneja/Library/Mobile Documents/com~apple~CloudDocs/Desktop/My Mac/Work/College/Research/implementBRaTS/Brats GLI"
train_dir: "training_data1_v2"
val_dir: "validation_data"
output_dir: "./runs_dynunet"
checkpoint_dir: "./checkpoints_dynunet"

# --- Data ---
modalities: ["t1n", "t1c", "t2w", "t2f"]
num_classes: 5           # 0=BG, 1=NETC, 2=SNFH, 3=ET, 4=RC
num_input_channels: 4
val_split: 0.1
data_fraction: 1.0
seed: 42

# --- Model ---
# 5 stages: 128 → 64 → 32 → 16 → 8
model:
  name: "DynUNet"
  spatial_dims: 3
  in_channels: 4
  out_channels: 5
  kernel_size:
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
  strides:
    - [1, 1, 1]
    - [2, 2, 2]
    - [2, 2, 2]
    - [2, 2, 2]
    - [2, 2, 2]
  deep_supervision: false  # set true for extra gradient signal (needs custom loss)

# --- Training ---
training:
  roi_size: [128, 128, 128]
  batch_size: 1
  num_workers: 0
  max_epochs: 30
  val_interval: 5
  amp: false
  cache_rate: 0.0

# --- Loss ---
loss:
  softmax: true
  to_onehot_y: true
  include_background: false
  lambda_dice: 1.0
  lambda_ce: 1.0

# --- Optimizer ---
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-5

# --- Scheduler ---
scheduler:
  warmup_epochs: 5

# --- Inference ---
inference:
  roi_size: [128, 128, 128]
  sw_batch_size: 2
  overlap: 0.5
  mode: "gaussian"
