# SwinUNETR — 3D Shifted-Window Transformer
# Trains with train.py, infers with inference.py

# --- Paths ---
# UPDATE: set to the absolute path of the folder containing training_data1_v2/ and validation_data/
data_root: "/path/to/BraTS_data"
train_dir: "training_data1_v2"
val_dir: "validation_data"
output_dir: "./runs_swinunetr"
checkpoint_dir: "./checkpoints_swinunetr"

# --- Data ---
modalities: ["t1n", "t1c", "t2w", "t2f"]
num_classes: 5           # 0=BG, 1=NETC, 2=SNFH, 3=ET, 4=RC
num_input_channels: 4
val_split: 0.1
data_fraction: 1.0
seed: 42

# --- Model ---
model:
  name: "SwinUNETR"
  spatial_dims: 3
  in_channels: 4
  out_channels: 5
  feature_size: 48       # full model size from paper (24 was reduced for MPS)
  drop_rate: 0.0
  attn_drop_rate: 0.0
  use_checkpoint: true   # gradient checkpointing — saves ~30% VRAM at minor speed cost

# --- Training ---
training:
  roi_size: [96, 96, 96]
  batch_size: 1
  num_workers: 4
  max_epochs: 500
  val_interval: 25
  amp: true
  cache_rate: 0.1

# --- Loss ---
loss:
  softmax: true
  to_onehot_y: true
  include_background: false
  lambda_dice: 1.0
  lambda_ce: 1.0
  lambda_hausdorff: 0.1  # boundary-aware HausdorffDT term; set to 0.0 to disable

# --- Optimizer ---
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-5

# --- Scheduler ---
scheduler:
  warmup_epochs: 50

# --- Inference ---
inference:
  roi_size: [96, 96, 96]
  sw_batch_size: 2
  overlap: 0.5
  mode: "gaussian"
