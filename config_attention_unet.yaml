# Attention U-Net — 3D with attention gates on skip connections
# Trains with train.py, infers with inference.py

# --- Paths ---
# UPDATE: set to the absolute path of the folder containing training_data1_v2/ and validation_data/
data_root: "/path/to/BraTS_data"
train_dir: "training_data1_v2"
val_dir: "validation_data"
output_dir: "./runs_attention_unet"
checkpoint_dir: "./checkpoints_attention_unet"

# --- Data ---
modalities: ["t1n", "t1c", "t2w", "t2f"]
num_classes: 5           # 0=BG, 1=NETC, 2=SNFH, 3=ET, 4=RC
num_input_channels: 4
val_split: 0.1
data_fraction: 1.0
seed: 42

# --- Model ---
# channels: feature map sizes at each encoder level (5 levels)
# strides:  downsampling between levels (4 steps: 128→64→32→16→8)
model:
  name: "AttentionUnet"
  spatial_dims: 3
  in_channels: 4
  out_channels: 5
  channels: [32, 64, 128, 256, 320]
  strides: [2, 2, 2, 2]
  dropout: 0.1

# --- Training ---
training:
  roi_size: [128, 128, 128]
  batch_size: 2
  num_workers: 4
  max_epochs: 300
  val_interval: 20
  amp: true
  cache_rate: 0.1

# --- Loss ---
loss:
  softmax: true
  to_onehot_y: true
  include_background: false
  lambda_dice: 1.0
  lambda_ce: 1.0

# --- Optimizer ---
optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-5

# --- Scheduler ---
scheduler:
  warmup_epochs: 30

# --- Inference ---
inference:
  roi_size: [128, 128, 128]
  sw_batch_size: 4
  overlap: 0.5
  mode: "gaussian"
